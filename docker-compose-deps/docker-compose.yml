x-project-name: &project-name docker-compose-matchpet
name: *project-name

networks:
  matchpet:
    driver: bridge
    name: matchpet

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: matchpet-api
    ports:
      - "8080:80"
    depends_on:
      - mysql
      - redis
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__MatchPet=server=mysql;port=3306;database=matchpet;user=root;password=root
      - Redis__Connection=redis:6379
    networks:
      - matchpet
  
  mysql:
    image: mysql:9.0
    container_name: matchpet-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: matchpet
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - matchpet
  
  redis:
    image: redis:7
    container_name: matchpet-redis
    ports:
      - "6379:6379"
    networks:
      - matchpet
  
  adminer:
    image: adminer
    container_name: matchpet-adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - mysql
    networks:
      - matchpet

  alloy:
    image: grafana/alloy:v1.7.5
    ports:
      - "12345:12345"
      - "4318:4318"
      - "4317:4317"
    volumes:
      - ../telemetry/config.alloy:/etc/alloy/config.alloy
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - loki
    networks:
      - matchpet
  
  prometheus:
    image: prom/prometheus:v3.1.0
    ports:
      - "9090:9090"
    volumes:
      - ../telemetry/prometheus.yml:/etc/prometheus/prometheus.yml
    command: --config.file=/etc/prometheus/prometheus.yml --web.enable-otlp-receiver --enable-feature=exemplar-storage
    networks:
      - matchpet
    
  
  loki:
    image: grafana/loki:3.4.2
    ports:
      - "3100:3100"
    volumes:
      - ../telemetry/loki-config.yml:/etc/loki/local-config.yml
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - matchpet
  
  grafana:
    image: grafana/grafana:11.5.2
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_FEATURE_TOGGLES_ENABLE=accessControlOnCall
    ports:
      - "3000:3000/tcp"
    volumes:
      - ../telemetry/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    networks:
      - matchpet
    
    # Tempo
    # Tempo runs as user 10001, and docker compose creates the volume as root.
    # As such, we need to chown the volume in order for Tempo to start correctly.
  
  init:
    image: &tempoImage grafana/tempo:2.7.1
    user: root
    entrypoint:
      - "chown"
      - "10001:10001"
      - "/var/tempo"
    volumes:
      - ./tempo-data:/var/tempo
    networks:
      - matchpet

  memcached:
    image: memcached:1.6.29
    container_name: memcached
    ports:
      - "11211:11211"
    environment:
      - MEMCACHED_MAX_MEMORY=64m  # Set the maximum memory usage
      - MEMCACHED_THREADS=4       # Number of threads to use
    networks:
      - matchpet
  
  tempo:
    image: *tempoImage
    command: [ "-config.file=/etc/tempo.yml" ]
    volumes:
      - ../telemetry/tempo.yml:/etc/tempo.yml
    ports:
      - "3200:3200"   # tempo
    depends_on:
      - init
      - memcached
    networks:
      - matchpet

volumes:
  mysql-data: