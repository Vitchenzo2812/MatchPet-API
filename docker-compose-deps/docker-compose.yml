x-project-name: &project-name docker-compose-matchpet
name: *project-name

networks:
  matchpet:
    driver: bridge
    name: matchpet

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: matchpet-api
    ports:
      - "8080:80"
    depends_on:
      - mysql
      - redis
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__MatchPet=server=mysql;port=3306;database=matchpet;user=root;password=root
      - Redis__Connection=redis:6379
    networks:
      - matchpet
  
  mysql:
    image: mysql:9.0
    container_name: matchpet-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: matchpet
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - matchpet
  
  redis:
    image: redis:7
    container_name: matchpet-redis
    ports:
      - "6379:6379"
    networks:
      - matchpet
  
  adminer:
    image: adminer
    container_name: matchpet-adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - mysql
    networks:
      - matchpet

  s3:
    image: localstack/localstack:latest
    container_name: matchpet-s3
    environment:
      - SERVICES=s3
      - AWS_DEFAULT_REGION=us-east-1
      - EDGE_PORT=4566
      - DATA_DIR=/tmp/localstack/data
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/tmp/localstack/data
    networks:
      - matchpet

volumes:
  mysql-data:
  localstack-data: